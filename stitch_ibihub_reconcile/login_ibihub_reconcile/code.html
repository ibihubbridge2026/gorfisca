<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ibihub Reconcile | Secure Enterprise Access</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "secondary-fixed": "#93f2f2",

                        "on-secondary-container": "#006e6e",
                        "outline-variant": "#bdcac0",
                        "primary": "#006947",
                        "inverse-primary": "#6fdba8",
                        "on-secondary": "#ffffff",
                        "background": "#f9f9fb",
                        "inverse-surface": "#2f3132",
                        "tertiary-fixed-dim": "#fbbc00",
                        "on-background": "#1a1c1d",

                        "primary-fixed": "#8bf8c3",

                        "on-primary-container": "#f5fff6",
                        "secondary-container": "#90efef",
                        "error": "#ba1a1a",

                        "surface-dim": "#d9dadc",
                        "surface-container-low": "#f3f3f5",

                        "on-primary": "#ffffff",
                        "surface": "#f9f9fb",
                        "surface-tint": "#006c49",
                        "surface-container-highest": "#e2e2e4",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#eeeef0",
                        "secondary": "#006a6a",
                        "on-secondary-fixed-variant": "#004f4f",
                        "on-primary-fixed": "#002113",
                        "inverse-on-surface": "#f0f0f2",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
        .editorial-shadow {
            box-shadow: 0 40px 100px -20px rgba(26, 28, 29, 0.06);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary/20">
<!-- Content Canvas -->
<main class="min-h-screen relative flex items-center justify-center p-6 overflow-hidden">
<!-- Subtle Emerald Background Accents -->
<div class="absolute top-[-10%] right-[-5%] w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-15%] left-[-5%] w-[800px] h-[800px] bg-secondary/5 rounded-full blur-[140px]"></div>
<!-- Background Imagery (Editorial Aesthetic) -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
<img alt="Background texture" class="w-full h-full object-cover grayscale" data-alt="abstract architectural glass structures with soft light and geometric shadows in a minimalist clean corporate environment" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA1mdbEa8VNh334fqUZYOYwm4cn7cEBLakhrA58I6xKmA83uqjOqXDhI2uCy38tnx39s4KIEQDbo_YehXPM2TC_i5wOnxqlDrbquRh5FugjzylKRUy2z36YmxMIn-Y0HmXj3WgWlm6701SZ_wuN7qqxrtFV6clRQ1_tIFJEP77oCJYkNrVh5_jexC6Ooszjx4MTb2AwuvUIGktwfgjowoXLTVvo4wVu1gvWVAL0G2nfAvwWloY2lRdP-azxpDrylZpSkCs2daur_uM"/>
</div>
<!-- Login Container -->
<div class="w-full max-w-xl relative z-10">
<!-- Brand Identity Section -->
<div class="text-center mb-12">
<div class="inline-flex items-center justify-center mb-6">
<div class="w-12 h-12 bg-primary rounded-[1rem] flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
</div>
<h1 class="font-headline font-extrabold text-3xl text-on-surface tracking-tight mb-2">Ibihub Reconcile</h1>
<p class="font-label uppercase tracking-[0.15em] text-on-surface-variant text-[0.7rem] font-semibold">Secure Enterprise Access</p>
</div>
<!-- Login Card (Glassmorphism) -->
<div class="glass-panel editorial-shadow rounded-lg p-10 md:p-14 relative border border-surface-container-highest/20">
<div class="mb-10 text-left">
<h2 class="font-headline font-bold text-2xl text-on-surface mb-2">Welcome back</h2>
<p class="text-on-surface-variant font-medium">Please enter your workspace credentials</p>
</div>
<form class="space-y-8">
<!-- Business Email Field -->
<div class="space-y-3">
<label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1" for="email">Business Email</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-lg px-5 py-4 text-on-surface placeholder-outline focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300" id="email" placeholder="officer@enterprise.com" type="email"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-outline/50">
<span class="material-symbols-outlined">alternate_email</span>
</div>
</div>
</div>
<!-- Password Field -->
<div class="space-y-3">
<div class="flex justify-between items-center px-1">
<label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:text-primary-container transition-colors" href="#">Forgot key?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-lg px-5 py-4 text-on-surface placeholder-outline focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300" id="password" placeholder="••••••••••••" type="password"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-outline/50">
<span class="material-symbols-outlined">lock_open</span>
</div>
</div>
</div>
<!-- Login CTA -->
<div class="pt-4">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold py-5 rounded-lg editorial-shadow hover:brightness-110 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-3" type="submit">
<span>Initialize Session</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</div>
</form>
<!-- Alternative Access -->
<div class="mt-12 flex items-center gap-4">
<div class="h-[1px] flex-grow bg-surface-container-highest"></div>
<span class="font-label text-[0.65rem] font-bold text-outline uppercase tracking-widest">Or authenticate with</span>
<div class="h-[1px] flex-grow bg-surface-container-highest"></div>
</div>
<div class="mt-8 grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-4 bg-surface-container-lowest rounded-lg border border-surface-container-highest/30 hover:bg-surface-container-low transition-colors duration-200">
<div class="w-5 h-5 bg-on-surface text-surface rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-[12px]">key</span>
</div>
<span class="font-body font-semibold text-sm">SSO Portal</span>
</button>
<button class="flex items-center justify-center gap-3 py-4 bg-surface-container-lowest rounded-lg border border-surface-container-highest/30 hover:bg-surface-container-low transition-colors duration-200">
<div class="w-5 h-5 bg-on-surface text-surface rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-[12px]">fingerprint</span>
</div>
<span class="font-body font-semibold text-sm">Biometric</span>
</button>
</div>
</div>
<!-- Footnote / Help -->
<div class="mt-10 flex flex-col items-center gap-6">
<div class="flex items-center gap-8 text-outline text-xs font-medium">
<a class="hover:text-primary transition-colors" href="#">Privacy Charter</a>
<a class="hover:text-primary transition-colors" href="#">Security Audit</a>
<a class="hover:text-primary transition-colors" href="#">Contact Sanctuary Support</a>
</div>
<!-- Trust Badge -->
<div class="flex items-center gap-2 px-4 py-2 bg-primary/5 rounded-full border border-primary/10">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-[0.65rem] font-bold text-primary uppercase tracking-widest">End-to-End Encrypted ERP Node</span>
</div>
</div>
</div>
</main>
